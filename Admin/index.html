<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประกันคุณภาพการศึกษา</title>
    <!-- Tailwind CSS cdn -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Lucide Icons cdn -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

    <!-- ⏳ ตัวโหลดสถานะ (Loader Spinner) -->
    <div id="global-loader" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[100] flex flex-col items-center justify-center hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mb-4"></div>
        <p id="loader-text" class="text-sm text-slate-300">กำลังดำเนินการ...</p>
    </div>

    <!-- 🔔 ส่วนแสดงข้อความแจ้งเตือน (Toast Notification) -->
    <div id="toast-container" class="fixed top-4 right-4 z-[99] space-y-2 pointer-events-none"></div>

    <!-- 🔒 ป๊อปอัปเข้าสู่ระบบ (Admin Login Modal) -->
    <div id="login-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-lg z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-sm w-full p-6 shadow-2xl slide-up">
            <!-- 🖼️ โลโก้สถาบัน -->
            <div class="flex justify-center mb-4">
                <img src="https://jedsadakorn-system.github.io/ThanapornWittaya/images/logo.png" alt="Logo" class="h-20 w-auto object-contain drop-shadow-[0_0_12px_rgba(99,102,241,0.2)]">
            </div>
            <h3 class="font-bold text-white text-lg text-center">ระบบประกันคุณภาพ</h3>
            <p class="text-xs text-slate-400 text-center mt-1 mb-6">สำหรับผู้ดูแลระบบจัดการผู้ใช้งาน</p>
            
            <form onsubmit="handleAdminLogin(event)" class="space-y-4 text-xs">
                <div>
                    <label class="block text-slate-400 mb-1 font-medium">Username</label>
                    <input type="text" id="login-username" required value="admin" placeholder="ใส่ชื่อผู้ใช้งานของคุณ" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-indigo-500 text-white">
                </div>
                <div>
                    <label class="block text-slate-400 mb-1 font-medium">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-indigo-500 text-white">
                </div>
                <button type="submit" class="w-full mt-2 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition shadow-lg shadow-indigo-600/20 text-xs flex items-center justify-center gap-2">
                    <i data-lucide="lock" class="w-3.5 h-3.5"></i>
                    <span>เข้าสู่ระบบ</span>
                </button>
            </form>
        </div>
    </div>

    <!-- 📑 พื้นที่เนื้อหาหลัก (แสดงผล 2 คอลัมน์เหมือนต้นฉบับ) -->
    <main id="main-content-container" class="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full hidden">
        <div id="main-content-view" class="space-y-6">
            <!-- เรนเดอร์หน้าตาการจัดการผ่าน JavaScript -->
        </div>
    </main>

    <script>
        // 🔑 ใส่ URL และ API Key ของ Supabase ของคุณที่นี่
        const SUPABASE_URL = "https://cvzntzmqzwbjavzurdbb.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_mMTYHVqeaSAegk6xUbJuKA_y01hOi7X";
        
        const clientAppSb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let systemUsersCache = [];

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        // 🔒 ฟังก์ชันล็อกอิน Admin
        async function handleAdminLogin(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('login-username').value.trim();
            const passwordInput = document.getElementById('login-password').value.trim();

            toggleLoader(true, "กำลังตรวจสอบสิทธิ์...");

            try {
                const { data, error } = await clientAppSb
                    .from('qa_users')
                    .select('*')
                    .eq('username', usernameInput)
                    .eq('password', passwordInput)
                    .single();

                if (error || !data) {
                    throw new Error("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
                }

                if (data.role !== 'admin') {
                    throw new Error("สิทธิ์การใช้งานของคุณไม่ได้รับอนุญาตให้เข้าหน้านี้");
                }

                currentUser = data;

                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('main-content-container').classList.remove('hidden');

                openAdminUserView();
                showToast("ยินดีต้อนรับเข้าสู่ระบบ", "success");

            } catch (err) {
                showToast(err.message || "ล็อกอินไม่สำเร็จ", "danger");
            } finally {
                toggleLoader(false);
            }
        }

        // 🚪 ออกจากระบบ
        function handleLogout() {
            currentUser = null;
            systemUsersCache = [];
            document.getElementById('login-username').value = 'admin'; 
            document.getElementById('login-password').value = '';
            document.getElementById('main-content-container').classList.add('hidden');
            document.getElementById('login-modal').classList.remove('hidden');
            showToast("ออกจากระบบเรียบร้อยแล้ว", "success");
        }

        // 👥 เปิดดูระบบจัดการผู้ใช้แบบ 2 คอลัมน์ (ตามไฟล์ ภาพ.png)
        async function openAdminUserView() {
            if (!currentUser || currentUser.role !== 'admin') {
                document.getElementById('main-content-view').innerHTML = `
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 text-center">
                        <i data-lucide="lock" class="w-10 h-10 text-red-500 mx-auto mb-3"></i>
                        <h3 class="text-sm font-bold text-white">🔒 ไม่สามารถเข้าถึงหน้านี้ได้</h3>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const mainView = document.getElementById('main-content-view');
            mainView.innerHTML = `
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                    <!-- ส่วนหัวเรื่องและการจัดการ -->
                    <div class="pb-4 border-b border-slate-800 mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                        <h2 class="text-base font-bold text-white flex items-center gap-2">
                            <i data-lucide="users" class="text-indigo-400 w-5 h-5"></i> ระบบจัดการผู้ใช้งาน (สำหรับผู้ดูแลระบบ)
                        </h2>
                        <!-- ปุ่มออกจากระบบด้านขวามือ -->
                        <button onclick="handleLogout()" class="flex items-center gap-2 px-3.5 py-2 bg-red-600/10 hover:bg-red-600 text-red-400 hover:text-white border border-red-500/20 rounded-xl transition text-xs font-medium shadow-sm">
                            <i data-lucide="log-out" class="w-4 h-4"></i>
                            <span>ออกจากระบบ</span>
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 text-xs md:text-sm">
                        <!-- คอลัมน์ซ้าย: ฟอร์มจัดการข้อมูล (กู้คืนจาก ภาพ.png) -->
                        <form id="user-manage-form" onsubmit="handleUserFormSubmit(event)" class="space-y-4 bg-slate-950/40 p-4 rounded-xl border border-slate-800/60 h-fit">
                            <input type="hidden" id="manage-user-id">
                            <h4 id="user-form-mode-title" class="font-bold text-indigo-400 border-b border-slate-800 pb-1 mb-2 flex items-center gap-1.5">
                                <i data-lucide="plus" class="w-4 h-4"></i> เพิ่มผู้ใช้งานใหม่
                            </h4>
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1">Username (ชื่อสำหรับล็อกอิน)</label>
                                <input type="text" id="manage-username" required placeholder="เช่น un_teacher1" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-xl text-white text-xs focus:outline-none focus:border-indigo-500">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1">Password (รหัสผ่าน)</label>
                                <input type="password" id="manage-password" required placeholder="••••••••" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-xl text-white text-xs focus:outline-none focus:border-indigo-500">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1">ชื่อ-นามสกุลจริง</label>
                                <input type="text" id="manage-name" required placeholder="เช่น นายสมชาย ใจดี" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-xl text-white text-xs focus:outline-none focus:border-indigo-500">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1">สิทธิ์การใช้งานระบบ (Role)</label>
                                <select id="manage-role" required class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-xl text-white text-xs focus:outline-none focus:border-indigo-500">
                                    <option value="teacher">คุณครู (Teacher) - เพิ่ม/ลบไฟล์ตัวเอง</option>
                                    <option value="admin">ผู้ดูแลระบบ (Admin) - จัดการทั้งหมด</option>
                                    <option value="guest">ผู้เข้าชมระบบ (Guest) - ดูข้อมูลเท่านั้น</option>
                                </select>
                            </div>
                            <div class="pt-2 flex gap-2">
                                <button type="button" id="btn-reset-user-form" onclick="resetUserForm()" class="hidden px-3 py-2 text-slate-300 bg-slate-800 rounded-xl w-1/3 text-xs hover:bg-slate-700 transition">ล้างค่า</button>
                                <button type="submit" class="px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium flex-1 text-xs transition shadow-lg shadow-indigo-600/10">บันทึกข้อมูล</button>
                            </div>
                        </form>

                        <!-- คอลัมน์ขวา: ตารางแสดงรายชื่อ -->
                        <div class="lg:col-span-2 space-y-2">
                            <h4 class="font-bold text-slate-300 flex items-center gap-1.5">📝 รายชื่อผู้ใช้งานทั้งหมดในระบบ</h4>
                            <div class="border border-slate-800 rounded-xl overflow-hidden bg-slate-950/20 max-h-[500px] overflow-y-auto">
                                <table class="w-full text-left border-collapse text-xs">
                                    <thead class="bg-slate-950 sticky top-0 border-b border-slate-800 text-slate-400">
                                        <tr>
                                            <th class="p-3">Username</th>
                                            <th class="p-3">ชื่อ-นามสกุล</th>
                                            <th class="p-3 text-center">สิทธิ์</th>
                                            <th class="p-3 text-right">การจัดการ</th>
                                        </tr>
                                    </thead>
                                    <tbody id="admin-user-table-body" class="divide-y divide-slate-800/60"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            await fetchSystemUsers();
        }

        // --- ⚙️ ดึงข้อมูลจาก Supabase ---
        async function fetchSystemUsers() {
            try {
                const { data, error } = await clientAppSb
                    .from('qa_users')
                    .select('*')
                    .order('id', { ascending: true });
                if (error) throw error;
                systemUsersCache = data || [];
                renderSystemUsersTable();
            } catch (err) {
                showToast("ไม่สามารถเรียกดูรายชื่อสมาชิกได้", "danger");
            }
        }

        // 📋 เรนเดอร์ตารางรายชื่อผู้ใช้งานพร้อมปุ่มแก้ไขและลบ
        function renderSystemUsersTable() {
            const tbody = document.getElementById('admin-user-table-body');
            if (!tbody) return;
            
            tbody.innerHTML = ''; 

            if (systemUsersCache.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-500">ไม่มีรายชื่อสมาชิกระบบในขณะนี้</td></tr>';
                return;
            }

            systemUsersCache.forEach(u => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800/30 transition text-xs";

                const roleColors = {
                    admin: 'bg-red-950/60 text-red-400 border border-red-900/40',
                    teacher: 'bg-blue-950/60 text-blue-400 border border-blue-900/40',
                    guest: 'bg-slate-800 text-slate-400 border border-slate-700'
                };

                tr.innerHTML = `
                    <td class="p-3 font-mono text-white font-medium">${u.username}</td>
                    <td class="p-3 text-slate-300">${u.name}</td>
                    <td class="p-3 text-center">
                        <span class="px-2 py-0.5 rounded text-[10px] uppercase font-bold ${roleColors[u.role] || ''}">${u.role}</span>
                    </td>
                    <td class="p-3 text-right space-x-1 whitespace-nowrap actions-cell"></td>
                `;

                const actionsCell = tr.querySelector('.actions-cell');

                // ✏️ ปุ่มแก้ไขข้อมูล (คลิกแล้วจะดึงข้อมูลไปแสดงที่ฟอร์มด้านซ้าย)
                const editBtn = document.createElement('button');
                editBtn.className = "inline-flex items-center justify-center p-1.5 text-amber-400 hover:bg-slate-800 rounded-lg transition";
                editBtn.innerHTML = `<i data-lucide="edit-2" class="w-3.5 h-3.5"></i>`;
                editBtn.title = "แก้ไขข้อมูล";
                editBtn.addEventListener('click', () => editUserFields(u.id));
                actionsCell.appendChild(editBtn);

                // 🗑️ ปุ่มลบข้อมูล (เปิดให้ลบได้โดยตรงกับ Database)
                if (u.username !== 'admin') { // ป้องกันไม่ให้เผลอลบสิทธิ์บัญชีหลักของตัวเอง
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = "inline-flex items-center justify-center p-1.5 text-red-400 hover:bg-red-950/40 rounded-lg transition";
                    deleteBtn.innerHTML = `<i data-lucide="trash-2" class="w-3.5 h-3.5"></i>`;
                    deleteBtn.title = "ลบผู้ใช้";
                    deleteBtn.addEventListener('click', () => handleDeleteUser(u.id, u.username));
                    actionsCell.appendChild(deleteBtn);
                }

                tbody.appendChild(tr);
            });

            lucide.createIcons();
        }

        // ฟังก์ชันดึงค่าไปที่ฟอร์มฝั่งซ้ายเพื่อเตรียมอัปเดต
        function editUserFields(userId) {
            const user = systemUsersCache.find(u => u.id === userId);
            if (!user) return;

            document.getElementById('manage-user-id').value = user.id;
            document.getElementById('manage-username').value = user.username;
            document.getElementById('manage-password').value = user.password || ''; 
            document.getElementById('manage-name').value = user.name;
            document.getElementById('manage-role').value = user.role;

            document.getElementById('user-form-mode-title').innerHTML = '<i data-lucide="edit-2" class="w-4 h-4"></i> แก้ไขข้อมูลผู้ใช้งาน';
            document.getElementById('btn-reset-user-form').classList.remove('hidden');
            lucide.createIcons();
        }

        function resetUserForm() {
            document.getElementById('user-manage-form').reset();
            document.getElementById('manage-user-id').value = '';
            document.getElementById('user-form-mode-title').innerHTML = '<i data-lucide="plus" class="w-4 h-4"></i> เพิ่มผู้ใช้งานใหม่';
            document.getElementById('btn-reset-user-form').classList.add('hidden');
            lucide.createIcons();
        }

        // 💾 ฟังก์ชันส่งข้อมูลฟอร์ม (เพิ่ม/อัปเดต) ไปยัง Supabase
        async function handleUserFormSubmit(e) {
            e.preventDefault();
            const userId = document.getElementById('manage-user-id').value;
            const username = document.getElementById('manage-username').value.trim();
            const password = document.getElementById('manage-password').value.trim();
            const name = document.getElementById('manage-name').value.trim();
            const role = document.getElementById('manage-role').value;

            toggleLoader(true, "กำลังบันทึกข้อมูล...");

            try {
                if (userId) {
                    const { error } = await clientAppSb
                        .from('qa_users')
                        .update({ username, password, name, role })
                        .eq('id', userId);

                    if (error) throw error;
                    showToast("อัปเดตข้อมูลผู้ใช้งานสำเร็จ", "success");
                } else {
                    const isExist = systemUsersCache.some(x => x.username.toLowerCase() === username.toLowerCase());
                    if (isExist) throw new Error("ชื่อผู้ใช้งานนี้มีผู้ใช้แล้วในระบบ");

                    const { error } = await clientAppSb
                        .from('qa_users')
                        .insert([{ username, password, name, role }]);

                    if (error) throw error;
                    showToast("เพิ่มผู้ใช้ใหม่เรียบร้อยแล้ว", "success");
                }

                resetUserForm();
                await fetchSystemUsers();
            } catch (err) {
                showToast(err.message || "เกิดข้อผิดพลาดในการบันทึก", "danger");
            } finally {
                toggleLoader(false);
            }
        }

        // 🗑️ ฟังก์ชันลบผู้ใช้งาน
        async function handleDeleteUser(userId, username) {
            if (!confirm(`คุณแน่ใจหรือไม่ว่าต้องการลบผู้ใช้งาน "${username}" ออกจากระบบ?`)) return;

            toggleLoader(true, "กำลังลบข้อมูลผู้ใช้งาน...");
            try {
                const { error } = await clientAppSb
                    .from('qa_users')
                    .delete()
                    .eq('id', userId);

                if (error) throw error;

                showToast(`ลบผู้ใช้งาน ${username} สำเร็จ`, "success");
                await fetchSystemUsers();
            } catch (err) {
                showToast(err.message || "ไม่สามารถลบผู้ใช้ได้ (กรุณาเช็กสิทธิ์ RLS บน Supabase)", "danger");
            } finally {
                toggleLoader(false);
            }
        }

        // --- 🛠️ ส่วนควบคุม UI ---
        function toggleLoader(show, text = "กำลังดำเนินการ...") {
            const loader = document.getElementById('global-loader');
            const lText = document.getElementById('loader-text');
            if (!loader) return;
            if (show) {
                lText.innerText = text;
                loader.classList.remove('hidden');
            } else {
                loader.classList.add('hidden');
            }
        }

        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white';
            toast.className = `${bgClass} text-xs px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 slide-up pointer-events-auto`;
            toast.innerHTML = `<i data-lucide="${type==='success'?'check-circle':'alert-circle'}" class="w-4 h-4"></i> <span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.remove(), 3500);
        }
    </script>
</body>
</html>
