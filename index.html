        function showToast(msg, type = 'success') {

            const iconMap = { success: 'check-circle', danger: 'alert-triangle', warning: 'alert-circle' };

            toast.className = `${bgMap[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 text-xs md:text-sm font-medium fade-in min-w-[240px]`;

        // --- IMAGE COMPRESSION ---
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxCoord = 1000; 
                        let width = img.width;
                        let height = img.height;
                        if (width > height && width > maxCoord) { height *= maxCoord / width; width = maxCoord; } 
                        else if (height > maxCoord) { width *= maxCoord / height; height = maxCoord; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', 0.7); 
                    };
                };
            });
        }

                toggleLoader(false);

        }

                            <div>
                                <label class="block text-xs font-medium text-slate-600 mb-1">ชื่อโครงการ / เอกสารอ้างอิง</label>

                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-600 mb-1">รูปแบบสื่อจัดเก็บ</label>
                                <select id="form-type" required onchange="toggleFormUploadSource()" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
                                    <option value="url">ลิงก์ภายนอกอินเทอร์เน็ต (URL)</option>

                                    <option value="doc">ไฟล์ Microsoft Word (doc/docx)</option>
                                    <option value="pdf">ไฟล์เอกสารรูปเล่ม PDF</option>
                                    <option value="jpg">รูปภาพหลักฐานสแกน (jpg)</option>
                                    <option value="png">รูปภาพหลักฐานสแกน (png)</option>

                            <div id="src-file-wrapper" class="hidden">
                                <label class="block text-xs font-medium text-slate-600 mb-1">เลือกไฟล์จากอุปกรณ์คอมพิวเตอร์ของคุณ</label>
                                <input type="file" id="form-file-input" class="w-full p-2 text-slate-500 border border-slate-200 border-dashed rounded-xl bg-slate-50">
                            </div>

                            <div class="pt-4 border-t border-slate-100 flex justify-end gap-2">
                                <button type="button" onclick="closeUploadModal()" class="px-4 py-2 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl font-medium">ยกเลิก</button>

        function executeSearchFilter() {
            searchQuery = document.getElementById('evidence-search-input').value;
            renderModulePart(activePartKey);
            const input = document.getElementById('evidence-search-input');
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);
        }

        function clearSearchFilter() { searchQuery = ''; renderModulePart(activePartKey); }

        // --- ACTION PROCESSING INTERSECTIONS ---
        function openUploadModal() {
            const partMeta = modulesStructure[activePartKey];
            const modal = document.getElementById('upload-modal');
            const selectInd = document.getElementById('form-indicator');
            
            let indHtml = '';
            Object.keys(partMeta.indicators).forEach(ind => { indHtml += `<option value="${ind}">${ind}</option>`; });
            selectInd.innerHTML = indHtml ? indHtml : `<option value="">เอกสารสำคัญโครงสร้างโรงเรียน</option>`;
            
            updateFormItemTypes();
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeUploadModal() {
            document.getElementById('upload-modal').classList.add('hidden');
            document.getElementById('upload-form').reset();
        }

        function updateFormItemTypes() {
            const partMeta = modulesStructure[activePartKey];
            const selectIndValue = document.getElementById('form-indicator').value;
            const selectItem = document.getElementById('form-item-type');
            let items = selectIndValue ? (partMeta.indicators[selectIndValue] || []) : (partMeta.indicators["เอกสารสำคัญ"] || []);
            let itemHtml = '';
            items.forEach(it => { itemHtml += `<option value="${it}">${it}</option>`; });
            selectItem.innerHTML = itemHtml;
        }

        function toggleFormUploadSource() {
            const type = document.getElementById('form-type').value;
            const linkWrap = document.getElementById('src-link-wrapper');
            const fileWrap = document.getElementById('src-file-wrapper');
            const urlInput = document.getElementById('form-source-url');
            const fileInput = document.getElementById('form-file-input');

            if (['url', 'drive'].includes(type)) {
                linkWrap.classList.remove('hidden'); fileWrap.classList.add('hidden');
                urlInput.required = true; fileInput.required = false;
            } else {
                linkWrap.classList.add('hidden'); fileWrap.classList.remove('hidden');
                urlInput.required = false; fileInput.required = true;
            }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const partNum = parseInt(activePartKey.replace('part', ''));
            const indTitle = document.getElementById('form-indicator').value;
            const itemType = document.getElementById('form-item-type').value;
            const title = document.getElementById('form-title').value.trim();
            const type = document.getElementById('form-type').value;
            
            toggleLoader(true, "กำลังเชื่อมโยงข้อมูลคลาวด์...");
            let finalSourceUrl = '';

            try {
                if (['url', 'drive'].includes(type)) {
                    finalSourceUrl = document.getElementById('form-source-url').value.trim();
                } else {
                    const fileInput = document.getElementById('form-file-input');
                    const rawFile = fileInput.files[0];
                    if (!rawFile) throw new Error("กรุณาเลือกไฟล์เอกสารหรือรูปภาพแนบระบบ");

                    let uploadedBlob = rawFile;
                    if (['jpg', 'png'].includes(type)) { uploadedBlob = await compressImage(rawFile); }

                    const fileExt = type === 'jpg' ? 'jpg' : (type === 'png' ? 'png' : rawFile.name.split('.').pop());
                    const uniqueFileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                    
                    const { data: uploadData, error: uploadErr } = await clientAppSb.storage
                        .from('img')
                        .upload(uniqueFileName, uploadedBlob, { contentType: uploadedBlob.type });

                    if (uploadErr) throw uploadErr;

                    const { data: urlData } = clientAppSb.storage.from('img').getPublicUrl(uniqueFileName);
                    finalSourceUrl = urlData.publicUrl;
                }

                const { error: dbErr } = await clientAppSb
                    .from('qa_evidences')
                    .insert([{
                        module_part: partNum,
                        standard_title: modulesStructure[activePartKey].title,
                        indicator_title: indTitle,
                        item_type: itemType,
                        title: title,
                        type: type,
                        source_url: finalSourceUrl,
                        created_by: currentUser.username
                    }]);

                if (dbErr) throw dbErr;

                showToast("บันทึกสารสนเทศร่องรอยสำเร็จ", "success");
                closeUploadModal();
                await fetchEvidences();
                renderModulePart(activePartKey);

            } catch (err) {
                showToast(err.message || "เกิดอุปสรรคข้อผิดพลาดในการอัปโหลด", "danger");
            } finally {
                toggleLoader(false);
            }
        }

        function deleteEvidenceItem(itemId) {
            openConfirmModal("ลบข้อมูลถาวร", "คุณแน่ใจใช่หรือไม่ที่จะลบรายการหลักฐานชิ้นนี้?", async () => {
                toggleLoader(true, "กำลังตัดการเชื่อมต่อ...");
                try {
                    const { error } = await clientAppSb.from('qa_evidences').delete().eq('id', itemId);
                    if (error) throw error;
                    showToast("ทำลายและลบรายการสำเร็จแล้ว", "success");
                    await fetchEvidences();
                    renderModulePart(activePartKey);
                } catch (err) {
                    showToast("ไม่สอดคล้องเงื่อนไขการลบข้อมูล", "danger");
                } finally { toggleLoader(false); }
            });
        }

        // --- AUTOMATED INITIALIZER SYSTEM ---
        window.addEventListener('DOMContentLoaded', () => {
            setupNavigation();
            // แก้ไขจุดบกพร่อง: สั่งรัน Router หน้าจอปลายทางแบบเจาะจงทันทีเมื่อโหลดโดมเสร็จสิ้น
            navigateTo(currentView);
        });
    </script>
</body>
</html>
